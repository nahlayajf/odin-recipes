    <h1>Turkey Sandwich Recipe</h1>
    <!-- Finished recipe -->
    <img src="../images/sandwich.jpg" alt="Turkey Sandwich" height="200" width="400">

    <h2><strong>Ingredients</strong></h2>
    <ul>
        <li>
            4 slices whole wheat or sourdough bread, toasted
        </li>
        <li>
            3 tbsp mayonnaise
        </li>
        <li>
            6 oz deli-sliced roasted turkey breast
        </li>
        <li>
            2-4 lettuce leaves (romaine or iceberg)
        </li>
        <li>
            4-6 thin slices tomato
        </li>
    </ul>
